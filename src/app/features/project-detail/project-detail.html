<div class="min-h-screen bg-[#0A0A0A] text-[#BCCBB9] ">

      <nav class="fixed top-0 w-full z-50 px-6 h-16 flex items-center border-b border-white/10 bg-[#0A0A0A]/80 backdrop-blur-sm">
        <a [routerLink]="['/']" class="flex items-center gap-2 text-sm hover:text-[#22C55E] transition-colors">
          ← {{ 'detail.back' | translate }}
        </a>
      </nav>

      @if (project()) {
        <div class="max-w-4xl mx-auto px-6 pt-32 pb-24">

          <div class="w-full h-72 rounded-2xl overflow-hidden mb-10">
            <img
              #heroImage
              [src]="project()!.image"
              [alt]="project()!.translations[lang()].title"
              class="w-full h-full object-cover opacity-0 scale-0"
            />
          </div>

          <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-10">
            <div class="flex flex-col gap-3">
              <h1 #title class="text-4xl font-bold text-white opacity-0 translate-y-5">
                {{ project()!.translations[lang()].title }}
              </h1>
              <div #techContainer class="flex flex-wrap gap-2">
                @for (tech of project()!.languages; track tech) {
                  <span #techItem class="text-xl font-extralight px-3 py-1 rounded-full bg-[#1F2937] text-[#4ADE80] opacity-0 -translate-y-5">
                    {{ tech }}
                  </span>
                }
              </div>
            </div>


            <a #liveButton [href]="project()!.liveUrl"
              target="_blank"
              class="shrink-0 px-6 py-3 bg-[#22C55E] text-[#0A0A0A] font-medium rounded-lg hover:bg-[#4ADE80] transition-colors text-sm"
            >
              {{ 'detail.live' | translate }} ↗
            </a>
          </div>

          <hr   class="border-white/10 mb-10" />

           <div  class=" border border-green-400 p-10 rounded-2xl shadow-[inset_5px_5px_20px_rgb(96,146,74)]">
             <markdown
              [data]="project()!.readme!"
              class="prose prose-invert prose-green max-w-none"
            />
            </div>

        </div>
      } @else {
        <div class="flex items-center justify-center min-h-screen">
          <p class="text-white/40">{{ 'detail.not_found' | translate }}</p>
        </div>
      }

</div>
