<section

id="hero"
class="relative min-h-screen flex items-center "
>


  <div class="relative w-full max-w-5xl mx-auto px-4">

    <div class="flex flex-col justify-center items-center gap-12">

      <div class="flex-1 flex justify-center">
        <div
          class="card w-60 h-60 lg:w-40 lg:h-40 rounded-full bg-[#202020]  border-black/70"
          #card
          (mousemove)="onMouseMove($event)"
          (mouseleave)="onMouseLeave()"
          style="transform-style: preserve-3d; will-change: transform;"
        >
          <img
            src="/assets/img/photo-perfil-job.jpg"
            alt="{{ 'hero.photo_alt' | translate }}"
            class="w-full h-full rounded-full object-cover"
          />
        </div>
      </div>

      <div #content class="flex-1 flex flex-col gap-5 text-[#BCCBB9] opacity-0">

        <h1 class="text-3xl lg:text-5xl font-bold text-white">
          {{ 'hero.name' | translate }}
        </h1>

        <h2 class="text-lg lg:text-xl font-medium text-[#4ADE80]">
          {{ 'hero.role' | translate }}
        </h2>

        <p #bio class="text-sm lg:text-base leading-relaxed text-[#BCCBB9]/80 max-w-md">
          @for (word of bioWords(); track $index) {
            <span class="inline-block">{{ word }}&nbsp;</span>
          }
        </p>

        <!-- CV + Redes -->
        <div class="flex items-center gap-6 mt-2">
          <a

            href="/assets/files/CV_2026.pdf"
            download
            class="px-6 py-3 bg-[#22C55E] text-[#0A0A0A] font-medium rounded-lg hover:bg-[#4ADE80] transition-colors text-sm"
          >
            {{ 'hero.cta_cv' | translate }}
          </a>

          <div class="flex items-center gap-4">
            <a
              href="https://linkedin.com/in/tuusuario"
              target="_blank"
              class="text-[#BCCBB9]/60 hover:text-[#22C55E] transition-colors"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93zM6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37z"/>
              </svg>
            </a>
            <a

              href="https://github.com/tuusuario"
              target="_blank"
              class="text-[#BCCBB9]/60 hover:text-[#22C55E] transition-colors"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5c.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34c-.46-1.16-1.11-1.47-1.11-1.47c-.91-.62.07-.6.07-.6c1 .07 1.53 1.03 1.53 1.03c.87 1.52 2.34 1.07 2.91.83c.09-.65.35-1.09.63-1.34c-2.22-.25-4.55-1.11-4.55-4.92c0-1.11.38-2 1.03-2.71c-.1-.25-.45-1.29.1-2.64c0 0 .84-.27 2.75 1.02c.79-.22 1.65-.33 2.5-.33s1.71.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02c.55 1.35.2 2.39.1 2.64c.65.71 1.03 1.6 1.03 2.71c0 3.82-2.34 4.66-4.57 4.91c.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2"/>
              </svg>
            </a>
          </div>

        </div>

      </div>

    </div>

  </div>
</section>
