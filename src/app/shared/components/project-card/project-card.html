 <div class="flex flex-col rounded-2xl overflow-hidden bg-[#1F2937] hover:scale-[1.02] transition-transform duration-300">

      <div class="relative overflow-hidden h-48">
        <img
          [src]="project().image"
          [alt]="project().translations[lang()].title"
          class="w-full h-full object-cover"
        />
      </div>

      <div class="flex flex-col gap-4 p-5 flex-1">

        <h3 class="text-white font-semibold text-lg leading-tight">
          {{ project().translations[lang()].title }}
        </h3>

        <p class="text-sm text-white/60 leading-relaxed flex-1">
          {{ project().translations[lang()].description }}
        </p>

        <div class="flex flex-wrap gap-2">
          @for (tech of project().languages; track tech) {
            <span class="text-xs px-3 py-1 rounded-full bg-[#0A0A0A] text-[#4ADE80]">
              {{ tech }}
            </span>
          }
        </div>

        <div class="flex gap-3 mt-auto">

          <a [href]="project().liveUrl"
            target="_blank"
            class="flex-1 text-center text-sm py-2 rounded-lg bg-[#22C55E] text-[#0A0A0A] font-medium hover:bg-[#4ADE80] transition-colors"
          >
            {{ 'projects.card.live' | translate }}
          </a>

          <a
            [routerLink]="['/projects', project().slug]"
            class="flex-1 text-center text-sm py-2 rounded-lg border border-white/20 text-white hover:border-[#22C55E] hover:text-[#22C55E] transition-colors"
          >
            {{ 'projects.card.detail' | translate }}
          </a>
        </div>

      </div>
    </div>
