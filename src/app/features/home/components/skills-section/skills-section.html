    <section #skills class="py-24 bg-[#0A0A0A]">
      <div class="max-w-5xl mx-auto px-6">

        <div #sectionHeader class="flex flex-col gap-2 mb-16">
          <p class="text-xs uppercase tracking-widest text-[#22C55E]">
            {{ 'skills.label' | translate }}
          </p>
          <h2 class="text-4xl font-bold text-white">
            {{ 'skills.title' | translate }}
          </h2>
        </div>

        <div  class="justify-center items-center grid grid-cols-1 md:grid-cols-2 gap-8">
          @for (category of categories; track category.key) {
            <div #categoryCard class="flex flex-col gap-4 p-6 rounded-2xl border border-white/10 bg-[#1F2937]">

              <div class="flex items-center gap-3">
                <h3 class="text-white font-semibold text-lg">
                  {{ 'skills.categories.' + category.key | translate }}
                </h3>
              </div>

                <div
                  cdkDropList
                  [id]="'list-' + category.key"
                  #doneList="cdkDropList"
                  [cdkDropListData]="category.skills"
                  [cdkDropListConnectedTo]="getConnectedLists(category.key)"
                  class="example-list flex justify-around"
                  (cdkDropListDropped)="drop($event)"
                >
                @for (skill of category.skills; track skill.name) {

                  <span #iconEls class="skill-badge rounded-full
                    cursor-default transition-all duration-300"
                    [attr.data-color]="skill.color"
                    cdkDrag
                    (mouseenter)="onHover($event, skill.color)"
                    (mouseleave)="onLeave($event)" [innerHTML]="skill.icon"></span>
                }
              </div>

            </div>
          }
        </div>

      </div>
    </section>
