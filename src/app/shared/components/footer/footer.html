    <footer class="bg-[#0A0A0A] border-t border-white/10 text-[#BCCBB9]">
      <div class="max-w-5xl mx-auto px-6 py-12">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-10 items-center">

          <!-- Nombre y frase -->
          <div class="flex flex-col gap-2">
            <span class="text-white font-semibold text-lg">Tu Nombre</span>
            <span class="text-xs uppercase tracking-widest text-white/40">
              {{ 'footer.role' | translate }}
            </span>
          </div>

          <!-- Redes -->
          <div class="flex flex-col items-center gap-4">
            <span class="text-xs uppercase tracking-widest text-white/40">
              {{ 'footer.follow' | translate }}
            </span>
            <div class="flex gap-6">

              <!-- LinkedIn -->
              <a
                href="https://linkedin.com/in/tuusuario"
                target="_blank"
                class="group flex items-center gap-2 text-sm hover:text-[#22C55E] transition-colors duration-300"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2zm-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93zM6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37z"/>
                </svg>
                LinkedIn
                <span class="block max-w-0 group-hover:max-w-full transition-all duration-300 h-px bg-[#22C55E]"></span>
              </a>

              <!-- GitHub -->
              <a

                href="https://github.com/tuusuario"
                target="_blank"
                class="group flex items-center gap-2 text-sm hover:text-[#22C55E] transition-colors duration-300"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5c.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34c-.46-1.16-1.11-1.47-1.11-1.47c-.91-.62.07-.6.07-.6c1 .07 1.53 1.03 1.53 1.03c.87 1.52 2.34 1.07 2.91.83c.09-.65.35-1.09.63-1.34c-2.22-.25-4.55-1.11-4.55-4.92c0-1.11.38-2 1.03-2.71c-.1-.25-.45-1.29.1-2.64c0 0 .84-.27 2.75 1.02c.79-.22 1.65-.33 2.5-.33s1.71.11 2.5.33c1.91-1.29 2.75-1.02 2.75-1.02c.55 1.35.2 2.39.1 2.64c.65.71 1.03 1.6 1.03 2.71c0 3.82-2.34 4.66-4.57 4.91c.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2"/>
                </svg>
                GitHub
              </a>

            </div>
          </div>

          <!-- Reloj Peru -->
          <div class="flex flex-col items-end gap-2">
            <span class="text-xs uppercase tracking-widest text-white/40">
              {{ 'footer.local_time' | translate }}
            </span>
            <div class="flex items-baseline gap-2">
              <span class="text-3xl font-mono font-semibold text-white tracking-tight">
                {{ time() }}
              </span>
              <span class="text-xs text-white/40">PET</span>
            </div>
            <span class="text-xs text-white/30">Lima, Perú 🇵🇪</span>
          </div>

        </div>

        <!-- Divider -->
        <hr class="border-white/10 my-8" />

        <!-- Bottom -->
        <div class="flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-white/30">
          <span>© {{ year() }} Tu Nombre. {{ 'footer.rights' | translate }}</span>
          <span>{{ 'footer.built_with' | translate }}</span>
        </div>

      </div>
    </footer>
