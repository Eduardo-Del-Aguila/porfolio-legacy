<section id="projects" class="bg-[#0A0A0A]">
      <div #pinContainer class="relative flex flex-col justify-center">

        <div class="px-15 pt-24 pb-10">
          <div #sectionHeader class="flex flex-col gap-2 opacity-0 translate-y-15">
            <p class="text-xs uppercase tracking-widest text-[#22C55E]">
              {{ 'projects.label' | translate }}
            </p>
            <h2 class="text-4xl font-bold text-white">
              {{ 'projects.title' | translate }}
            </h2>
          </div>
        </div>
        <div>
          <p class="text-3xl text-[#0A0A0A] "> sapo </p>
        </div>

        <div class="overflow-hidden">
          <div #track class="flex items-center gap-12 md:gap-32 lg:gap-40 px-15 pb-24 w-max">
            @for (project of projects(); track project.slug) {
              <app-project-card [project]="project" />
            }
          </div>
        </div>

      </div>
 </section>
